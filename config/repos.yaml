# =============================================================================
# repos.yaml — Service registry
# =============================================================================
#
# SINGLE REPO (IS_MONOREPO=false in .env):
#   The entire repo is one service. No `services` array needed.
#   api_paths narrows where Claude looks for routes.
#
# MONOREPO (IS_MONOREPO=true in .env):
#   Define a `services` array. Each service has a `path` relative to repo root.
#   Claude will discover and analyze each service independently.
#
# =============================================================================

# ── Single repo example ───────────────────────────────────────────────────────
 repo:
  name: sop-order-creation
  api_paths:
    - src/main/kotlin

